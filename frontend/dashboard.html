<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Smart API configuration
        const getApiBaseUrl = () => {
            const hostname = window.location.hostname;
            const port = window.location.port;
            
            console.log('Current hostname:', hostname, 'port:', port);
            
            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port === '5500') {
                return 'http://localhost:5000';  
            }
            
            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port === '5000') {
                return '';
            }
            
            if (hostname.includes('vercel.app')) {
                return '';
            }
            
            return 'https://gani-eleke-backend.onrender.com';
        };
        
        const API_BASE_URL = getApiBaseUrl();
        console.log('API Base URL:', API_BASE_URL || 'relative path');
        
        const getApiUrl = (path) => {
            const basePath = API_BASE_URL ? `${API_BASE_URL}/api` : '/api';
            return `${basePath}${path}`;
        };
    </script>
</head>
<body class="bg-gray-100 font-sans antialiased" x-data="{
    page: 'dashboard',
    
    // Common data
    token: localStorage.getItem('token'),
    
    // Dashboard summary
    summary: { 
        totalReceipts: 0, 
        totalCredit: 0, 
        totalDebit: 0, 
        totalBalance: 0, 
        landRentSummary: { totalRentals: 0, activeRentals: 0, totalRevenue: 0, activeRevenue: 0 }, 
        supplySummary: { totalSupplies: 0, activeSupplies: 0, lowStockItems: 0, outOfStockItems: 0, totalValue: 0 } 
    },
    
    // Receipt data
    receipts: [],
    search: '',
    showModal: false,
    currentReceipt: null,
    customerName: '',
    customerPhone: '',
    customerAddress: '',
    vehicleNo: '',
    expenses: '',
    items: [{ description: '', quantity: '', dust: '', rate: '' }],
    
    // Land Rent data
    landRents: [],
    landCustomerName: '',
    landCustomerPhone: '',
    truckType: '',
    startDate: '',
    duration: '',
    plotNumber: '',
    rentalRate: '',
    landNotes: '',
    showLandForm: true,
    
    // Supplies data
    supplies: [],
    categories: [],
    showSupplyForm: false,
    supplySearch: '',
    categoryFilter: '',
    statusFilter: '',
    supplyName: '',
    supplyDescription: '',
    supplyCategory: '',
    supplyUnit: '',
    currentStock: '',
    minimumStock: '',
    unitPrice: '',
    supplier: '',
    location: '',
    barcode: '',
    supplyNotes: '',
    
    // Settings - Danger Zone
    showClearReceiptsModal: false,
    showClearAllModal: false,
    clearingType: null,
    
    // ============ COMMON FUNCTIONS ============
    logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    },
    
    // ============ DASHBOARD FUNCTIONS ============
    async loadSummary() {
        if (!this.token) return;
        
        try {
            const [receiptRes, landRentRes, supplyRes] = await Promise.all([
                fetch(getApiUrl('/receipts/summary'), { headers: { 'Authorization': 'Bearer ' + this.token } }),
                fetch(getApiUrl('/landrents/summary'), { headers: { 'Authorization': 'Bearer ' + this.token } }),
                fetch(getApiUrl('/supplies/summary'), { headers: { 'Authorization': 'Bearer ' + this.token } })
            ]);
            
            if (receiptRes.ok) {
                const receiptData = await receiptRes.json();
                this.summary.totalReceipts = receiptData.totalReceipts || 0;
                this.summary.totalCredit = receiptData.totalCreditAmount || 0;
                this.summary.totalDebit = receiptData.totalDebitAmount || 0;
                this.summary.totalBalance = receiptData.totalBalance || 0;
            }
            
            if (landRentRes.ok) {
                this.summary.landRentSummary = await landRentRes.json();
            }
            
            if (supplyRes.ok) {
                this.summary.supplySummary = await supplyRes.json();
            }
        } catch (err) {
            console.error('Failed to load summary', err);
        }
    },
    
    // ============ RECEIPT FUNCTIONS ============
    addItem() {
        this.items.push({ description: '', quantity: '', dust: '', rate: '' });
    },
    
    removeItem(index) {
        if (this.items.length > 1) {
            this.items.splice(index, 1);
        }
    },
    
    get totalPayment() {
        let total = 0;
        for (let item of this.items) {
            if (item.quantity && item.rate) {
                const itemTotal = (parseFloat(item.quantity) * parseFloat(item.rate)) - (parseFloat(item.dust) || 0);
                total += itemTotal;
            }
        }
        const debit = parseFloat(this.expenses) || 0;
        return Math.max(total - debit, 0);
    },
    
    get filteredReceipts() {
        return this.receipts.filter(r => 
            r.customerName?.toLowerCase().includes(this.search.toLowerCase()) ||
            r.receiptNumber?.toLowerCase().includes(this.search.toLowerCase())
        );
    },
    
    async loadReceipts() {
        if (!this.token) return;
        
        try {
            const res = await fetch(getApiUrl('/receipts'), { headers: { 'Authorization': 'Bearer ' + this.token } });
            if (res.ok) {
                this.receipts = await res.json();
            }
        } catch (err) {
            console.error('Failed to load receipts', err);
        }
    },
    
    async createReceipt() {
        if (!this.token) return;
        
        const credits = [];
        for (let item of this.items) {
            if (item.description && item.quantity && item.rate) {
                credits.push({
                    description: item.description,
                    qty: parseFloat(item.quantity),
                    dust: parseFloat(item.dust) || 0,
                    rate: parseFloat(item.rate)
                });
            }
        }
        
        if (credits.length === 0) {
            alert('Please add at least one item');
            return;
        }
        
        const less = [];
        if (this.expenses && parseFloat(this.expenses) > 0) {
            less.push({ description: 'Offloading', amount: parseFloat(this.expenses), date: new Date() });
        }
        
        const data = {
            customerName: this.customerName,
            customerPhone: this.customerPhone,
            customerAddress: this.customerAddress,
            vehicle: this.vehicleNo,
            receiptTitle: 'Sales Receipt',
            credits: credits,
            less: less,
            companyInfo: { 
                name: 'Africa Steel Ltd', 
                email: 'ganiolaiya123@gmail.com', 
                phone: '08033281397, 08052944592, 08062514308', 
                address: 'Line11, Shop 1, Owode Onirin, Ikorodu road, Lagos.' 
            },
            creditorName: 'Gani Eleke',
            creditorPhone: '08033281397'
        };
        
        try {
            const res = await fetch(getApiUrl('/receipts'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                const receipt = await res.json();
                this.receipts.unshift(receipt);
                this.currentReceipt = receipt;
                this.showModal = true;
                // Reset form
                this.customerName = '';
                this.customerPhone = '';
                this.customerAddress = '';
                this.vehicleNo = '';
                this.expenses = '';
                this.items = [{ description: '', quantity: '', dust: '', rate: '' }];
                await this.loadSummary();
            } else {
                const error = await res.json();
                alert(error.message || 'Error creating receipt');
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    },
    
    async downloadPDF(type) {
        if (!this.currentReceipt) return;
        
        try {
            const url = getApiUrl(`/receipts/${this.currentReceipt._id}/pdf?type=${type}`);
            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + this.token } });
            if (res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `receipt-${this.currentReceipt.receiptNumber}-${type}.pdf`;
                a.click();
                URL.revokeObjectURL(url);
                this.showModal = false;
            } else {
                alert('Failed to generate PDF');
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    },
    
    // ============ LAND RENT FUNCTIONS ============
    async loadLandRents() {
        if (!this.token) return;
        
        try {
            const res = await fetch(getApiUrl('/landrents'), { headers: { 'Authorization': 'Bearer ' + this.token } });
            if (res.ok) {
                this.landRents = await res.json();
            }
        } catch (err) {
            alert('Network error');
        }
    },
    
    get totalLandAmount() {
        const rate = parseFloat(this.rentalRate) || 0;
        const dur = parseInt(this.duration) || 0;
        return rate * dur;
    },
    
    async createLandRent() {
        if (!this.token) return;
        
        const data = {
            customerName: this.landCustomerName,
            customerPhone: this.landCustomerPhone,
            truckType: this.truckType,
            startDate: this.startDate,
            duration: parseInt(this.duration),
            plotNumber: this.plotNumber,
            rentalRate: parseFloat(this.rentalRate),
            notes: this.landNotes
        };
        
        try {
            const res = await fetch(getApiUrl('/landrents'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                const landRent = await res.json();
                this.landRents.unshift(landRent);
                this.landCustomerName = '';
                this.landCustomerPhone = '';
                this.truckType = '';
                this.startDate = '';
                this.duration = '';
                this.plotNumber = '';
                this.rentalRate = '';
                this.landNotes = '';
                alert('Land rental registered successfully!');
                await this.loadSummary();
            } else {
                const error = await res.json();
                alert(error.message || 'Error creating land rental');
            }
        } catch (err) {
            alert('Network error');
        }
    },
    
    // ============ SUPPLIES FUNCTIONS ============
    async loadSupplies() {
        if (!this.token) return;
        
        try {
            const params = new URLSearchParams();
            if (this.categoryFilter) params.append('category', this.categoryFilter);
            if (this.statusFilter) params.append('status', this.statusFilter);
            
            const res = await fetch(getApiUrl(`/supplies?${params}`), { headers: { 'Authorization': 'Bearer ' + this.token } });
            if (res.ok) {
                this.supplies = await res.json();
            }
        } catch (err) {
            alert('Network error');
        }
    },
    
    async loadCategories() {
        if (!this.token) return;
        
        try {
            const res = await fetch(getApiUrl('/supplies/categories'), { headers: { 'Authorization': 'Bearer ' + this.token } });
            if (res.ok) {
                this.categories = await res.json();
            }
        } catch (err) {
            console.error('Failed to load categories');
        }
    },
    
    async createSupply() {
        if (!this.token) return;
        
        const data = {
            name: this.supplyName,
            description: this.supplyDescription,
            category: this.supplyCategory,
            unit: this.supplyUnit,
            currentStock: parseFloat(this.currentStock) || 0,
            minimumStock: parseFloat(this.minimumStock) || 0,
            unitPrice: parseFloat(this.unitPrice),
            supplier: this.supplier,
            location: this.location,
            barcode: this.barcode,
            notes: this.supplyNotes
        };
        
        try {
            const res = await fetch(getApiUrl('/supplies'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                const supply = await res.json();
                this.supplies.unshift(supply);
                this.resetSupplyForm();
                this.showSupplyForm = false;
                alert('Supply added successfully!');
                await this.loadSummary();
            } else {
                const error = await res.json();
                alert(error.message || 'Error creating supply');
            }
        } catch (err) {
            alert('Network error');
        }
    },
    
    resetSupplyForm() {
        this.supplyName = '';
        this.supplyDescription = '';
        this.supplyCategory = '';
        this.supplyUnit = '';
        this.currentStock = '';
        this.minimumStock = '';
        this.unitPrice = '';
        this.supplier = '';
        this.location = '';
        this.barcode = '';
        this.supplyNotes = '';
    },
    
    get filteredSupplies() {
        return this.supplies.filter(supply => 
            supply.name?.toLowerCase().includes(this.supplySearch.toLowerCase()) ||
            supply.category?.toLowerCase().includes(this.supplySearch.toLowerCase())
        );
    },
    
    getStockStatus(supply) {
        if (supply.currentStock === 0) return { text: 'Out of Stock', color: 'red' };
        if (supply.currentStock <= supply.minimumStock) return { text: 'Low Stock', color: 'yellow' };
        return { text: 'In Stock', color: 'green' };
    },
    
    async updateStock(supplyId, operation) {
        const quantity = prompt(`Enter quantity to ${operation}:`);
        if (!quantity || isNaN(quantity)) return;
        
        try {
            const res = await fetch(getApiUrl(`/supplies/${supplyId}/stock`), {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
                body: JSON.stringify({ quantity: parseFloat(quantity), operation })
            });
            if (res.ok) {
                const updatedSupply = await res.json();
                const index = this.supplies.findIndex(s => s._id === supplyId);
                if (index !== -1) {
                    this.supplies[index] = updatedSupply;
                }
                alert(`Stock ${operation}d successfully!`);
                await this.loadSummary();
            } else {
                const error = await res.json();
                alert(error.message || 'Error updating stock');
            }
        } catch (err) {
            alert('Network error');
        }
    },
    
    // ============ CLEAR TRANSACTIONS ============
    async clearTransactions(type) {
        if (!this.token) return;
        
        try {
            let response;
            if (type === 'receipts') {
                response = await fetch(getApiUrl('/receipts/clear'), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } });
            } else if (type === 'landrents') {
                response = await fetch(getApiUrl('/landrents/clear'), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } });
            } else if (type === 'supplies') {
                response = await fetch(getApiUrl('/supplies/clear'), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } });
            } else if (type === 'all') {
                await Promise.all([
                    fetch(getApiUrl('/receipts/clear'), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } }),
                    fetch(getApiUrl('/landrents/clear'), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } }),
                    fetch(getApiUrl('/supplies/clear'), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } })
                ]);
                response = { ok: true };
            }
            
            if (response && response.ok) {
                alert(`${type.toUpperCase()} cleared successfully!`);
                await this.loadSummary();
                if (type === 'receipts' || type === 'all') await this.loadReceipts();
                if (type === 'landrents' || type === 'all') await this.loadLandRents();
                if (type === 'supplies' || type === 'all') await this.loadSupplies();
                this.showClearReceiptsModal = false;
                this.showClearAllModal = false;
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    }
    
}" x-init="async function() { 
    await loadSummary(); 
    await loadReceipts(); 
    await loadLandRents(); 
    await loadSupplies(); 
    await loadCategories(); 
}()">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
            <div class="p-6 flex items-center gap-3 border-b border-slate-800">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center p-1 font-bold text-white shadow-lg overflow-hidden border border-white/10">
                    <img src="/frontend/img/image.jpg" alt="Gani Eleke Logo" class="w-full h-full object-contain">
                </div>
                <span class="text-xl font-bold tracking-tight text-white">Gani Eleke Ent</span>
            </div>

            <nav class="flex-1 mt-6 px-4 space-y-2">
                <button @click="page = 'dashboard'" :class="page === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all">
                    <i class="fa-solid fa-chart-line w-5"></i>
                    <span class="font-medium">Dashboard</span>
                </button>
                <button @click="page = 'receipt'" :class="page === 'receipt' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all">
                    <i class="fa-solid fa-file-invoice-dollar w-5"></i>
                    <span class="font-medium text-left">Generate Receipt</span>
                </button>
                <button @click="page = 'landrent'" :class="page === 'landrent' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all">
                    <i class="fa-solid fa-house-chimney-user w-5"></i>
                    <span class="font-medium">Land Rent</span>
                </button>
                <button @click="page = 'supplies'" :class="page === 'supplies' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all">
                    <i class="fa-solid fa-truck-ramp-box w-5"></i>
                    <span class="font-medium text-left">Supplies</span>
                </button>
                <button @click="page = 'settings'" :class="page === 'settings' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all">
                    <i class="fa-solid fa-gears w-5"></i>
                    <span class="font-medium">Settings</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button @click="logout" class="flex items-center justify-center gap-2 hover:bg-slate-800 text-red-500 font-bold rounded-lg px-4 py-3 transition-colors w-full">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span class="font-medium">LogOut</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            
            <!-- ============ DASHBOARD PAGE ============ -->
            <template x-if="page === 'dashboard'">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-8 uppercase tracking-wide">Dashboard Overview</h2>
                    
                    <!-- Receipt Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Receipts</p>
                            <p class="text-3xl font-black text-green-600 mt-1" x-text="summary.totalReceipts"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Credits</p>
                            <p class="text-3xl font-black text-green-500 mt-1" x-text="'₦' + summary.totalCredit.toLocaleString()"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Debits</p>
                            <p class="text-3xl font-black text-blue-600 mt-1" x-text="'₦' + summary.totalDebit.toLocaleString()"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Balance</p>
                            <p class="text-3xl font-black text-orange-600 mt-1" x-text="'₦' + summary.totalBalance.toLocaleString()"></p>
                        </div>
                    </div>

                    <!-- Land Rent Stats -->
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Land Rentals Overview</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Rentals</p>
                            <p class="text-3xl font-black text-purple-600 mt-1" x-text="summary.landRentSummary.totalRentals"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Active Rentals</p>
                            <p class="text-3xl font-black text-green-600 mt-1" x-text="summary.landRentSummary.activeRentals"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Revenue</p>
                            <p class="text-3xl font-black text-blue-600 mt-1" x-text="'₦' + summary.landRentSummary.totalRevenue.toLocaleString()"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Active Revenue</p>
                            <p class="text-3xl font-black text-indigo-600 mt-1" x-text="'₦' + summary.landRentSummary.activeRevenue.toLocaleString()"></p>
                        </div>
                    </div>

                    <!-- Supplies Stats -->
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Inventory Overview</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Items</p>
                            <p class="text-3xl font-black text-purple-600 mt-1" x-text="summary.supplySummary.totalSupplies"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Active Items</p>
                            <p class="text-3xl font-black text-green-600 mt-1" x-text="summary.supplySummary.activeSupplies"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Low Stock</p>
                            <p class="text-3xl font-black text-yellow-600 mt-1" x-text="summary.supplySummary.lowStockItems"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Out of Stock</p>
                            <p class="text-3xl font-black text-red-600 mt-1" x-text="summary.supplySummary.outOfStockItems"></p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <p class="text-gray-500 text-sm font-semibold uppercase">Inventory Value</p>
                            <p class="text-3xl font-black text-blue-600 mt-1" x-text="'₦' + summary.supplySummary.totalValue.toLocaleString()"></p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ RECEIPT PAGE ============ -->
            <template x-if="page === 'receipt'">
                <div class="space-y-6">
                    <!-- Search Section -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-xl font-bold text-slate-800 uppercase tracking-tight">Find Older Receipt</h2>
                        <div class="relative w-full max-w-sm">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i class="fa-solid fa-magnifying-glass text-sm"></i>
                            </span>
                            <input type="text" x-model="search" placeholder="Search name or Receipt ID..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            <div x-show="search.length > 0" x-transition class="absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-2xl max-h-60 overflow-y-auto">
                                <template x-for="receipt in filteredReceipts" :key="receipt._id">
                                    <div class="p-3 hover:bg-blue-50 transition-colors border-b border-slate-50 cursor-pointer">
                                        <p class="text-sm font-bold text-slate-800" x-text="receipt.customerName"></p>
                                        <p class="text-[10px] text-slate-400" x-text="receipt.receiptNumber + ' • ' + new Date(receipt.createdAt).toLocaleDateString()"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Generate Receipt Form -->
                    <div class="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800 border-b pb-4">Generate New Receipt</h2>
                        
                        <form @submit.prevent="createReceipt()" class="space-y-5">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="text-xs font-bold uppercase text-slate-500">Customer Name *</label><input type="text" x-model="customerName" class="w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-lg" required></div>
                                <div><label class="text-xs font-bold uppercase text-slate-500">Customer Phone</label><input type="tel" x-model="customerPhone" class="w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-lg"></div>
                                <div><label class="text-xs font-bold uppercase text-slate-500">Customer Address</label><input type="text" x-model="customerAddress" class="w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-lg"></div>
                                <div><label class="text-xs font-bold uppercase text-slate-500">Vehicle No.</label><input type="text" x-model="vehicleNo" class="w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-lg"></div>
                            </div>

                            <div class="border-t pt-4">
                                <div class="flex justify-between items-center mb-3">
                                    <label class="text-sm font-bold uppercase text-slate-600">Items Details</label>
                                    <button type="button" @click="addItem()" class="text-blue-600 text-sm font-semibold hover:text-blue-800"><i class="fa-solid fa-plus mr-1"></i> Add Item</button>
                                </div>
                                <div class="space-y-3">
                                    <template x-for="(item, index) in items" :key="index">
                                        <div class="grid grid-cols-12 gap-2 items-end bg-gray-50 p-3 rounded-lg">
                                            <div class="col-span-4"><label class="text-[10px] font-bold uppercase text-slate-400">Description</label><input type="text" x-model="item.description" placeholder="Mix, Cast, etc" class="w-full p-2 text-sm border rounded-lg"></div>
                                            <div class="col-span-2"><label class="text-[10px] font-bold uppercase text-slate-400">QTY</label><input type="number" x-model="item.quantity" step="0.01" class="w-full p-2 text-sm border rounded-lg"></div>
                                            <div class="col-span-2"><label class="text-[10px] font-bold uppercase text-slate-400">DUST (KG)</label><input type="number" x-model="item.dust" step="0.01" class="w-full p-2 text-sm border rounded-lg"></div>
                                            <div class="col-span-2"><label class="text-[10px] font-bold uppercase text-slate-400">RATE (₦)</label><input type="number" x-model="item.rate" step="0.01" class="w-full p-2 text-sm border rounded-lg"></div>
                                            <div class="col-span-1"><button type="button" @click="removeItem(index)" class="text-red-500 hover:text-red-700 p-2" x-show="items.length > 1"><i class="fa-solid fa-trash-can"></i></button></div>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <div><label class="text-xs font-bold uppercase text-slate-500">Offloading Expenses</label><input type="number" x-model="expenses" step="0.01" class="w-full p-3 mt-1 bg-gray-50 border border-gray-200 rounded-lg"></div>
                            <div class="pt-2"><label class="text-xs font-bold uppercase text-blue-600">Total Payment</label><input type="text" :value="'₦' + totalPayment.toLocaleString()" class="w-full p-4 bg-blue-50 border-2 border-blue-200 rounded-xl font-bold text-lg text-blue-700" readonly></div>
                            
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-3"><i class="fa-solid fa-print"></i> Generate Receipt</button>
                        </form>
                    </div>

                    <!-- Print Modal -->
                    <div x-show="showModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                        <div @click.away="showModal = false" class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center">
                            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fa-solid fa-file-invoice"></i></div>
                            <h3 class="text-2xl font-bold text-slate-800 mb-2">Print Receipt</h3>
                            <p class="text-slate-500 text-sm mb-8">Select the destination for this receipt copy.</p>
                            <div class="space-y-3">
                                <button @click="downloadPDF('company')" class="w-full py-4 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition"><i class="fa-solid fa-building-shield mr-2"></i> Company Copy</button>
                                <button @click="downloadPDF('customer')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition"><i class="fa-solid fa-user-check mr-2"></i> Customer Copy</button>
                                <button @click="showModal = false" class="w-full py-3 text-slate-400 text-sm font-semibold hover:text-slate-600">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ LAND RENT PAGE ============ -->
            <template x-if="page === 'landrent'">
                <div class="space-y-6">
                    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6 text-slate-800 border-b pb-4">Land Rental Registration</h2>
                        <form @submit.prevent="createLandRent()" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Customer Name *</label><input type="text" x-model="landCustomerName" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Customer Phone</label><input type="tel" x-model="landCustomerPhone" class="w-full p-3 border border-gray-200 rounded-lg"></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Truck Type *</label><input type="text" x-model="truckType" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Plot Number *</label><input type="text" x-model="plotNumber" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Start Date *</label><input type="date" x-model="startDate" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Duration (Days) *</label><input type="number" x-model="duration" min="1" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Daily Rate (₦) *</label><input type="number" x-model="rentalRate" step="0.01" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Total Amount (₦)</label><input type="text" :value="'₦' + totalLandAmount.toLocaleString()" class="w-full p-3 bg-blue-50 border-2 border-blue-200 rounded-lg font-bold text-blue-700" readonly></div>
                            </div>
                            <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Notes</label><textarea x-model="landNotes" rows="3" class="w-full p-3 border border-gray-200 rounded-lg" placeholder="Additional notes..."></textarea></div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold hover:bg-blue-700 transition">Register Land Rental</button>
                        </form>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                            <h2 class="text-xl font-bold text-gray-800">All Land Rental Transactions</h2>
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold" x-text="landRents.filter(r => r.status === 'active').length + ' Active'"></span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Customer</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Plot</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Truck</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Duration</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Amount</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Status</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">End Date</th></tr></thead>
                                <tbody class="divide-y divide-gray-200">
                                    <template x-for="rental in landRents" :key="rental._id">
                                        <tr class="hover:bg-gray-50"><td class="px-6 py-4"><div class="text-sm font-medium text-gray-900" x-text="rental.customerName"></div><div class="text-sm text-gray-500" x-text="rental.customerPhone"></div></td><td class="px-6 py-4 text-sm text-gray-900" x-text="rental.plotNumber"></td><td class="px-6 py-4 text-sm text-gray-900" x-text="rental.truckType"></td><td class="px-6 py-4 text-sm text-gray-900" x-text="rental.duration + ' days'"></td><td class="px-6 py-4 text-sm font-bold text-green-600" x-text="'₦' + rental.totalAmount.toLocaleString()"></td><td class="px-6 py-4"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" :class="rental.status === 'active' ? 'bg-green-100 text-green-800' : rental.status === 'completed' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'" x-text="rental.status"></span></td><td class="px-6 py-4 text-sm text-gray-900" x-text="new Date(rental.endDate).toLocaleDateString()"></td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div x-show="landRents.length === 0" class="p-8 text-center text-gray-500"><i class="fa-solid fa-house-chimney-user text-4xl mb-4 text-gray-300"></i><p>No land rental transactions yet.</p></div>
                    </div>
                </div>
            </template>

            <!-- ============ SUPPLIES PAGE ============ -->
            <template x-if="page === 'supplies'">
                <div class="space-y-6">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div><h2 class="text-xl font-bold text-slate-800">Inventory Management</h2><p class="text-slate-500 text-sm mt-1" x-text="`${supplies.length} items in inventory`"></p></div>
                        <button @click="showSupplyForm = !showSupplyForm" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition"><i class="fa-solid fa-plus mr-2"></i> Add Supply</button>
                    </div>

                    <div x-show="showSupplyForm" x-transition class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-lg font-bold mb-6 text-slate-800">Add New Supply</h3>
                        <form @submit.prevent="createSupply()" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Supply Name *</label><input type="text" x-model="supplyName" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Category *</label><select x-model="supplyCategory" class="w-full p-3 border border-gray-200 rounded-lg" required><option value="">Select Category</option><template x-for="cat in categories" :key="cat"><option :value="cat" x-text="cat"></option></template><option value="Cement">Cement</option><option value="Iron Rods">Iron Rods</option><option value="Granite">Granite</option><option value="Wood">Wood</option></select></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Unit *</label><select x-model="supplyUnit" class="w-full p-3 border border-gray-200 rounded-lg" required><option value="">Select Unit</option><option value="tons">Tons</option><option value="bags">Bags</option><option value="pieces">Pieces</option><option value="cubic meters">Cubic Meters</option></select></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Unit Price (₦) *</label><input type="number" x-model="unitPrice" step="0.01" class="w-full p-3 border border-gray-200 rounded-lg" required></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Current Stock</label><input type="number" x-model="currentStock" step="0.01" class="w-full p-3 border border-gray-200 rounded-lg"></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Minimum Stock</label><input type="number" x-model="minimumStock" step="0.01" class="w-full p-3 border border-gray-200 rounded-lg"></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Supplier</label><input type="text" x-model="supplier" class="w-full p-3 border border-gray-200 rounded-lg"></div>
                                <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Location</label><input type="text" x-model="location" class="w-full p-3 border border-gray-200 rounded-lg"></div>
                            </div>
                            <div><label class="block text-xs font-bold uppercase text-gray-400 mb-1">Description</label><textarea x-model="supplyDescription" rows="3" class="w-full p-3 border border-gray-200 rounded-lg"></textarea></div>
                            <div class="flex gap-4"><button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700">Add Supply</button><button type="button" @click="showSupplyForm = false; resetSupplyForm()" class="bg-gray-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-gray-600">Cancel</button></div>
                        </form>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex flex-col md:flex-row gap-4"><div class="flex-1"><input type="text" x-model="supplySearch" placeholder="Search supplies..." class="w-full p-3 border border-gray-200 rounded-lg"></div><div class="flex gap-4"><select x-model="categoryFilter" @change="loadSupplies()" class="p-3 border border-gray-200 rounded-lg"><option value="">All Categories</option><template x-for="cat in categories" :key="cat"><option :value="cat" x-text="cat"></option></template></select><select x-model="statusFilter" @change="loadSupplies()" class="p-3 border border-gray-200 rounded-lg"><option value="">All Status</option><option value="active">Active</option><option value="inactive">Inactive</option></select></div></div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Supply</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Category</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Stock</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Unit Price</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Total Value</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Status</th><th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Actions</th></tr></thead>
                                <tbody class="divide-y divide-gray-200">
                                    <template x-for="supply in filteredSupplies" :key="supply._id">
                                        <tr class="hover:bg-gray-50"><td class="px-6 py-4"><div class="text-sm font-medium text-gray-900" x-text="supply.name"></div><div class="text-sm text-gray-500" x-text="supply.description"></div></td><td class="px-6 py-4 text-sm text-gray-900" x-text="supply.category"></td><td class="px-6 py-4"><div class="text-sm font-medium text-gray-900" x-text="`${supply.currentStock} ${supply.unit}`"></div><div class="text-xs text-gray-500" x-text="`Min: ${supply.minimumStock} ${supply.unit}`"></div></td><td class="px-6 py-4 text-sm font-bold text-green-600" x-text="'₦' + supply.unitPrice.toLocaleString()"></td><td class="px-6 py-4 text-sm font-bold text-blue-600" x-text="'₦' + supply.totalValue.toLocaleString()"></td><td class="px-6 py-4"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" :class="getStockStatus(supply).color === 'red' ? 'bg-red-100 text-red-800' : getStockStatus(supply).color === 'yellow' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'" x-text="getStockStatus(supply).text"></span></td><td class="px-6 py-4"><div class="flex gap-2"><button @click="updateStock(supply._id, 'add')" class="text-green-600 hover:text-green-900" title="Add Stock"><i class="fa-solid fa-plus"></i></button><button @click="updateStock(supply._id, 'subtract')" class="text-red-600 hover:text-red-900" title="Subtract Stock"><i class="fa-solid fa-minus"></i></button></div></td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div x-show="filteredSupplies.length === 0" class="p-8 text-center text-gray-500"><i class="fa-solid fa-boxes-stacked text-4xl mb-4 text-gray-300"></i><p>No supplies found.</p></div>
                    </div>
                </div>
            </template>

            <!-- ============ SETTINGS PAGE ============ -->
            <template x-if="page === 'settings'">
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                        <h2 class="text-2xl font-bold mb-6 text-slate-800">System Settings</h2>
                        <div class="space-y-6"><div><label class="block text-sm font-bold text-gray-700 mb-2 uppercase">Assigned User Role</label><select class="w-full p-4 border border-gray-300 rounded-xl bg-gray-50"><option>Administrator</option><option>Agent</option><option>Secretary</option></select></div><div class="flex items-center justify-between p-4 bg-blue-50 rounded-xl"><div><h4 class="font-bold text-blue-900">Developer Mode</h4><p class="text-xs text-blue-700">Access system logs and API endpoints</p></div><input type="checkbox" class="w-6 h-6 rounded"></div></div>
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-sm border-2 border-red-200">
                        <div class="flex items-center gap-3 mb-6"><i class="fa-solid fa-triangle-exclamation text-2xl text-red-600"></i><h2 class="text-2xl font-bold text-red-600">Danger Zone</h2></div>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-red-50 rounded-xl"><div><h4 class="font-bold text-red-800">Clear All Receipts</h4><p class="text-xs text-red-600">Delete all receipt transactions</p></div><button @click="showClearReceiptsModal = true; clearingType = 'receipts'" class="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">Clear Receipts</button></div>
                            <div class="flex items-center justify-between p-4 bg-red-50 rounded-xl"><div><h4 class="font-bold text-red-800">Clear All Land Rentals</h4><p class="text-xs text-red-600">Delete all land rental transactions</p></div><button @click="showClearReceiptsModal = true; clearingType = 'landrents'" class="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">Clear Land Rentals</button></div>
                            <div class="flex items-center justify-between p-4 bg-red-50 rounded-xl"><div><h4 class="font-bold text-red-800">Clear All Supplies</h4><p class="text-xs text-red-600">Delete all supply inventory</p></div><button @click="showClearReceiptsModal = true; clearingType = 'supplies'" class="bg-red-600 text-white px-6 py-2 rounded-lg font-bold">Clear Supplies</button></div>
                            <div class="flex items-center justify-between p-4 bg-red-700 rounded-xl"><div><h4 class="font-bold text-white">⚠️ DELETE ALL TRANSACTIONS ⚠️</h4><p class="text-xs text-red-100">Delete EVERYTHING - Receipts, Land Rentals, and Supplies</p></div><button @click="showClearAllModal = true" class="bg-white text-red-700 px-6 py-2 rounded-lg font-bold">DELETE ALL</button></div>
                        </div>
                    </div>

                    <!-- Confirmation Modals -->
                    <div x-show="showClearReceiptsModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60"><div class="bg-white w-full max-w-md rounded-3xl p-8 text-center"><div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl"><i class="fa-solid fa-trash-can"></i></div><h3 class="text-2xl font-bold text-slate-800 mb-2">Confirm Deletion</h3><p class="text-slate-500 mb-6">Delete all <span class="font-bold text-red-600" x-text="clearingType"></span>? Cannot be undone!</p><div class="flex gap-4"><button @click="showClearReceiptsModal = false" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">Cancel</button><button @click="clearTransactions(clearingType)" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Delete All</button></div></div></div>
                    <div x-show="showClearAllModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60"><div class="bg-white w-full max-w-md rounded-3xl p-8 text-center border-2 border-red-300"><div class="w-20 h-20 bg-red-600 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-4xl"><i class="fa-solid fa-skull-crossbones"></i></div><h3 class="text-2xl font-bold text-red-600 mb-2">⚠️ DESTRUCTIVE ACTION ⚠️</h3><p class="text-red-600 font-bold mb-6">This will delete EVERYTHING! Cannot be undone!</p><div class="flex gap-4"><button @click="showClearAllModal = false" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">Cancel</button><button @click="clearTransactions('all')" class="flex-1 py-3 bg-red-700 text-white rounded-xl font-bold">DELETE EVERYTHING</button></div></div></div>
                </div>
            </template>

        </main>
    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
